<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>匿语阁 ｜ BABBLE</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/message.css') }}">
</head>
<body>
    <nav class="top-nav">
        <a href="/message" class="nav-brand">
            <span class="nav-brand-main">匿语阁</span>
            <span class="nav-brand-sub">BABBLE</span>
        </a>
        <div class="nav-center"></div>
        <div class="nav-actions">
            <!-- 👑 隐藏成长入口 -->
            <!-- <button class="points-entry-btn" type="button" onclick="openPointsModalByEntry()">成长进度</button> -->
            <button id="themeToggle" class="theme-toggle" type="button">🌙 暗色主题</button>
        </div>
    </nav>

    <!-- 🔥 五一限时活动横幅 -->
    <div class="event-banner">🎉 限时活动 · 五一挑战（5.1 ~ 5.5）—— 每天发两帖 或 邀请三名新同学 解锁会员 👑</div>

    <div class="main">
        <div id="authPanel">
            <div id="authNotLogin">
                <input id="loginUsername" type="text" placeholder="用户名">
                <input id="loginPassword" type="password" placeholder="密码">
                <input id="loginInviter" type="text" placeholder="邀请人用户名（选填）">
                <button onclick="doRegister()">注册</button>
                <button onclick="doLogin()">登录</button>
            </div>
            <div id="authLogged" style="display:none;">
                已登录：<b id="currentUser"></b>
                <button onclick="doLogout()">退出</button>
            </div>
        </div>

        <div class="anonymous-info">💬 无需登录即可匿名发帖</div>

        <form id="mainForm">
            <textarea name="content" placeholder="写点什么..." required></textarea>
            <button type="submit">匿名发帖</button>
        </form>

        <div id="listContainer"></div>
    </div>

<script>
let me=null;
async function refreshMe(){
    const res=await fetch('/me');const data=await res.json();
    me=data.logged_in?data.username:null;
    document.getElementById('authLogged').style.display=me?'block':'none';
    document.getElementById('authNotLogin').style.display=me?'none':'block';
    if(me)document.getElementById('currentUser').innerText=me;
}
async function doRegister(){
    const u=document.getElementById('loginUsername').value.trim();
    const p=document.getElementById('loginPassword').value.trim();
    const inv=document.getElementById('loginInviter').value.trim();
    const fd=new FormData();fd.append('username',u);fd.append('password',p);fd.append('inviter',inv);
    const res=await fetch('/register',{method:'POST',body:fd});
    alert((await res.json()).message||'注册结果');
    await refreshMe();
}
async function doLogin(){
    const u=document.getElementById('loginUsername').value.trim();
    const p=document.getElementById('loginPassword').value.trim();
    const fd=new FormData();fd.append('username',u);fd.append('password',p);
    const res=await fetch('/login',{method:'POST',body:fd});
    const data=await res.json();if(data.status==='ok'){alert('登录成功');await refreshMe();await loadMessages();}
    else alert(data.message);
}
async function doLogout(){
    await fetch('/logout',{method:'POST'});me=null;await refreshMe();await loadMessages();
}
document.getElementById('mainForm').addEventListener('submit',async e=>{
    e.preventDefault();
    const fd=new FormData(e.target);
    const res=await fetch('/upload',{method:'POST',body:fd});
    const data=await res.json();
    if(data.status==='ok')alert(isEventPeriod(data)?'活动发帖成功':'发帖成功');
    await loadMessages();
});
async function loadMessages(){
    const res=await fetch('/messages');
    const data=await res.json();
    const cont=document.getElementById('listContainer');
    cont.innerHTML=data.messages.map(m=>{
        return `<div class="message"><div class="date">#${m.id} · ${m.username||'匿名'} · ${m.created_at}</div><div class="content">${m.content}</div></div>`;
    }).join('');
}
await refreshMe();await loadMessages();
function isEventPeriod(data){return data.activity_mode===true;}
</script>
</body>
</html>
