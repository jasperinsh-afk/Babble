<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>叭啦 | 留言板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/message.css') }}">
</head>
<body>

    <div id="toast" class="success-toast">
        <span id="toastText">发送成功</span>
        <button class="close-btn" type="button" onclick="hideToast()">×</button>
    </div>

    <nav class="top-nav">
        <div class="nav-left">
            <a href="/message" class="nav-brand">
                <span class="nav-brand-main">叭啦</span>
                <span class="nav-brand-sep">|</span>
                <span class="nav-brand-sub">留言板</span>
                <span class="nav-brand-beta">BETA</span>
            </a>
        </div>

        <div class="nav-right">
            <button class="vote-btn" onclick="window.open('https://ibabble.online','_blank')">去投票</button>
            <button id="refreshBtn" class="refresh-btn" type="button" onclick="loadMessages()">↻ 刷新</button>
        </div>
    </nav>

    <div class="main" id="mainPage">
        <div class="anonymous-info">💬 无需登录即可匿名发帖 / 发图片</div>

        <form id="mainForm" enctype="multipart/form-data">
            <textarea class="todo" name="content" placeholder="写点什么...（可选）"></textarea>

            <div style="margin:8px 0; text-align:left;">
                <label id="imageUploadLabel" style="
                    display:inline-flex; align-items:center; gap:6px;
                    padding:6px 14px; border-radius:999px;
                    background:rgba(93,62,168,0.08); color:#5d3ea8;
                    font-size:14px; font-weight:600; cursor:pointer;
                    border:1px solid rgba(93,62,168,0.2);
                ">
                    <span>🖼️ 发图片</span>
                </label>
                <input
                    id="imageInput"
                    name="image"
                    type="file"
                    accept="image/png,image/jpeg,image/jpg,image/gif,image/webp"
                    style="display:none;"
                >
            </div>

            <div id="imagePreview" style="
                margin:8px 0; max-width:280px; display:none;
                border-radius:14px; overflow:hidden;
            "></div>

            <div class="button-group">
                <button class="submit main-submit-btn" type="submit">匿名发帖</button>
            </div>
        </form>

        <div id="listContainer"></div>
    </div>

<script>
function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastText').innerText = msg || '操作成功';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

function esc(s='') {
    return String(s).replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
    ));
}

// 提交发帖
document.getElementById('mainForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const fd = new FormData(this);
    const submitBtn = this.querySelector('.main-submit-btn');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = '发送中...';
    submitBtn.disabled = true;

    try {
        const res = await fetch('/upload', { method: 'POST', body: fd });
        const data = await res.json();
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;

        if (res.status === 429) return alert('⏱ ' + (data.message || '发送太频繁'));
        if (data.status === 'ok') {
            this.reset();
            document.getElementById('imagePreview').style.display = 'none';
            showToast('发送成功！');
            await loadMessages();
        } else alert('❌ ' + (data.message || '发送失败'));
    } catch (e) {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
        alert('❌ 发送失败，请稍后重试');
    }
});

// 图片预览
const imageInput = document.getElementById('imageInput');
const imagePreview = document.getElementById('imagePreview');
imageInput.addEventListener('change', function() {
    const file = this.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
        alert('❌ 请选择图片文件');
        this.value = '';
        imagePreview.style.display = 'none';
        return;
    }
    if (file.size > 5 * 1024 * 1024) {
        alert('❌ 图片最大支持 5MB');
        this.value = '';
        imagePreview.style.display = 'none';
        return;
    }
    const url = URL.createObjectURL(file);
    imagePreview.innerHTML = `<img src="${url}" style="width:100%; display:block; border-radius:14px;">`;
    imagePreview.style.display = 'block';
});

document.getElementById('imageUploadLabel').addEventListener('click', () => {
    imageInput.click();
});

// 点赞
async function toggleLike(messageId, btnEl) {
    const fd = new FormData();
    fd.append('message_id', String(messageId));
    const res = await fetch('/toggle_like', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.status !== 'ok') return alert('❌ ' + (data.message || '点赞失败'));
    btnEl.classList.toggle('liked', !!data.liked);
    const c = btnEl.querySelector('.like-count');
    if (c) c.innerText = Number(data.like_count || 0);
}

// 回复
async function submitReply(messageId) {
    const input = document.getElementById('reply_input_' + messageId);
    const content = input.value.trim();
    if (!content) return alert('回复内容不能为空');

    const fd = new FormData();
    fd.append('message_id', String(messageId));
    fd.append('reply_content', content);

    const replyBtn = input.nextElementSibling;
    const originalText = replyBtn.textContent;
    replyBtn.textContent = '回复中...';
    replyBtn.disabled = true;

    try {
        const res = await fetch('/reply', { method: 'POST', body: fd });
        const data = await res.json();
        replyBtn.textContent = originalText;
        replyBtn.disabled = false;
        if (res.status === 429) return alert('⏱ ' + (data.message || '发送太频繁'));
        if (data.status === 'ok') {
            input.value = '';
            showToast('回复成功！');
            await loadMessages();
        } else alert('❌ ' + (data.message || '回复失败'));
    } catch (e) {
        replyBtn.textContent = originalText;
        replyBtn.disabled = false;
        alert('❌ 回复失败，请稍后重试');
    }
}

// 加载留言
async function loadMessages() {
    const container = document.getElementById('listContainer');
    const res = await fetch('/messages');
    const data = await res.json();

    if (data.status !== 'ok') {
        container.innerHTML = `<div class="error-message"><h3>加载失败</h3><p>请稍后重试</p></div>`;
        return;
    }

    const list = data.messages || [];
    if (!list.length) {
        container.innerHTML = `<div class="no-messages">还没有留言，快来发布第一条吧～</div>`;
        return;
    }

    container.innerHTML = list.map(m => {
        const contentHtml = m.content ? `<div class="content">${esc(m.content)}</div>` : '';
        const imageHtml = m.image_path ? `<div class="content"><img src="${esc(m.image_path)}" alt="img"></div>` : '';
        const likeCount = Number(m.like_count || 0);
        const likedCls = m.liked_by_me ? 'liked' : '';

        const replies = (m.replies || []).map(r => `
            <div class="reply">
                <div class="reply-content"><span class="reply-author">${esc(r.username || '匿名')}</span>：${esc(r.content || '')}</div>
                <div class="reply-date">${esc(r.date || '')}</div>
            </div>
        `).join('');

        return `
            <div class="message">
                <div class="message-head">
                    <div class="message-id">#${m.id}</div>
                    <div class="message-author">${esc(m.username || '匿名')}</div>
                    <div class="message-date">${esc(m.date || '')}</div>
                </div>

                ${contentHtml}
                ${imageHtml}

                <div class="message-actions">
                    <button class="like-btn ${likedCls}" onclick="toggleLike(${m.id}, this)">
                        <span class="like-icon">❤️</span>
                        <span class="like-count">${likeCount}</span>
                    </button>
                </div>

                <div class="reply-section">
                    <div class="reply-box">
                        ${replies || '<div class="no-reply">暂无回复</div>'}
                    </div>
                    <div class="reply-form">
                        <input id="reply_input_${m.id}" type="text" placeholder="写下回复..." autocomplete="off">
                        <button class="reply-submit-btn" onclick="submitReply(${m.id})">回复</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    document.querySelectorAll('.reply-form input').forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                this.nextElementSibling?.click();
            }
        });
    });
}

(async function init() {
    await loadMessages();
})();
</script>
</body>
</html>
