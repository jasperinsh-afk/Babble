<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>叭啦 | 留言板</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/message.css') }}">
</head>
<body>

    <div id="toast" class="success-toast">
        <span id="toastText">发送成功</span>
        <button class="close-btn" type="button" onclick="hideToast()">×</button>
    </div>

    <nav class="top-nav">
        <div class="nav-left">
            <a href="/message" class="nav-brand">
                <span class="nav-brand-main">叭啦</span>
                <span class="nav-brand-sep">|</span>
                <span class="nav-brand-sub">留言板</span>
                <span class="nav-brand-beta">BETA</span>
            </a>
        </div>

        <div class="nav-right">
            <button id="refreshBtn" class="refresh-btn" type="button" onclick="loadMessages()">↻ 刷新</button>
        </div>
    </nav>

    <div class="main" id="mainPage">
        <div class="anonymous-info">💬 无需登录即可匿名发帖</div>

        <form id="mainForm">
            <textarea class="todo" name="content" placeholder="写点什么..." required></textarea>
            <div class="button-group">
                <button class="submit main-submit-btn" type="submit">匿名发帖</button>
            </div>
        </form>

        <div id="listContainer"></div>
    </div>

<script>
function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastText').innerText = msg || '操作成功';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
}
function hideToast() { document.getElementById('toast').classList.remove('show'); }

function esc(s='') {
    return String(s).replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
    ));
}

document.getElementById('mainForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const fd = new FormData(this);
    const submitBtn = this.querySelector('.main-submit-btn');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = '发送中...';
    submitBtn.disabled = true;

    try {
        const res = await fetch('/upload', { method: 'POST', body: fd });
        const data = await res.json();
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;

        if (res.status === 429) return alert('⏱ ' + (data.message || '发送太频繁'));
        if (data.status === 'ok') {
            this.reset();
            showToast('发送成功！系统已为您生成随机昵称');
            await loadMessages();
        } else alert('❌ ' + (data.message || '发送失败'));
    } catch (e) {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
        alert('❌ 发送失败，请稍后重试');
    }
});

async function toggleLike(messageId, btnEl) {
    const fd = new FormData();
    fd.append('message_id', String(messageId));
    const res = await fetch('/toggle_like', { method: 'POST', body: fd });
    const data = await res.json();
    if (res.status === 401) return alert('❌ 请先登录后再点赞');
    if (data.status !== 'ok') return alert('❌ ' + (data.message || '点赞失败'));
    btnEl.classList.toggle('liked', !!data.liked);
    const c = btnEl.querySelector('.like-count');
    if (c) c.innerText = Number(data.like_count || 0);
}

async function submitReply(messageId) {
    const input = document.getElementById('reply_input_' + messageId);
    const content = input.value.trim();
    if (!content) return alert('回复内容不能为空');

    const fd = new FormData();
    fd.append('message_id', String(messageId));
    fd.append('reply_content', content);

    const replyBtn = input.nextElementSibling;
    const originalText = replyBtn.textContent;
    replyBtn.textContent = '回复中...';
    replyBtn.disabled = true;

    try {
        const res = await fetch('/reply', { method: 'POST', body: fd });
        const data = await res.json();
        replyBtn.textContent = originalText;
        replyBtn.disabled = false;
        if (res.status === 429) return alert('⏱ ' + (data.message || '发送太频繁'));
        if (data.status === 'ok') {
            input.value = '';
            showToast('回复成功！');
            await loadMessages();
        } else alert('❌ ' + (data.message || '回复失败'));
    } catch (e) {
        replyBtn.textContent = originalText;
        replyBtn.disabled = false;
        alert('❌ 回复失败，请稍后重试');
    }
}

async function loadMessages() {
    const container = document.getElementById('listContainer');
    const res = await fetch('/messages');
    const data = await res.json();

    if (data.status !== 'ok') {
        container.innerHTML = `<div class="error-message"><h3>加载失败</h3><p>请稍后重试</p></div>`;
        return;
    }

    const list = data.messages || [];
    if (!list.length) {
        container.innerHTML = `<div class="no-messages">还没有留言，快来发布第一条吧～</div>`;
        return;
    }

    container.innerHTML = list.map(m => {
        const contentHtml = m.content ? `<div class="content">${esc(m.content)}</div>` : '';
        const imageHtml = m.image_path ? `<div class="content"><img src="${esc(m.image_path)}" alt="img"></div>` : '';

        const likeCount = Number(m.like_count || 0);
        const likedCls = m.liked_by_me ? 'liked' : '';

        const replies = (m.replies || []).map(r => `
            <div class="reply">
                <div class="reply-content"><span class="reply-author">${esc(r.username || '匿名')}</span><span class="reply-colon">：</span>${esc(r.content || '')}</div>
                <div class="reply-date">${esc(r.date || '')}</div>
            </div>
        `).join('');

        return `
            <div class="message">
                <div class="message-head">
                    <div class="message-id">#${m.id}</div>
                    <div class="message-author">${esc(m.username || '匿名')}</div>
                    <div class="message-date">${esc(m.date || '')}</div>
                </div>

                ${contentHtml}
                ${imageHtml}

                <div class="message-actions">
                    <button class="like-btn ${likedCls}" type="button" onclick="toggleLike(${m.id}, this)">
                        <span class="like-icon">❤️</span>
                        <span class="like-count">${likeCount}</span>
                    </button>
                </div>

                <div class="reply-section">
                    <div class="reply-box">
                        ${replies || '<div class="no-reply">暂无回复</div>'}
                    </div>

                    <div class="reply-form">
                        <input id="reply_input_${m.id}" type="text" placeholder="写下回复..." autocomplete="off">
                        <button class="reply-submit-btn" type="button" onclick="submitReply(${m.id})">回复</button>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    // 为所有回复输入框添加回车提交功能
    document.querySelectorAll('.reply-form input').forEach(input => {
        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                const submitBtn = this.nextElementSibling;
                if (submitBtn) submitBtn.click();
            }
        });
    });
}

(async function init() {
    await loadMessages();
})();
</script>
</body>
</html>
