<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>匿语阁 | BABBLE</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/message.css') }}">
  <style>
    body {
      margin: 0;
      font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC",sans-serif;
    }
    .emergency-overlay {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%), linear-gradient(135deg,#2b0000 0%,#7a0000 45%,#d10000 100%);
      overflow: hidden;
    }
    .emergency-panel {
      width: min(92vw,760px);
      padding: 40px 28px;
      border:1px solid rgba(255,255,255,0.18);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(6px);
      color:#fff;
    }
    .emergency-tag {
      display:inline-block;
      margin-bottom:18px;
      padding:6px 12px;
      border:1px solid rgba(255,255,255,0.22);
      font-size:12px;
      letter-spacing:2px;
      color:rgba(255,255,255,0.82);
    }
    .emergency-title {
      margin:0 0 18px;
      font-size:clamp(34px,7vw,64px);
      font-weight:900;
      line-height:1.06;
    }
    .emergency-divider {width:100%;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.6),rgba(255,255,255,0.08));margin:18px 0 26px;}
    .emergency-lines{display:grid;gap:12px;}
    .emergency-line{font-size:clamp(20px,3.2vw,30px);font-weight:700;color:rgba(255,255,255,0.9);}

    .points-entry-btn{
      margin-right:10px;
      border-radius:999px;
      border:2px solid rgba(255,255,255,.8);
      background:linear-gradient(135deg,#ffd76a,#ff914d);
      color:#3d00ad;
      font-weight:900;
      font-size:14px;
      padding:8px 14px;
      cursor:pointer;
      box-shadow:0 8px 20px rgba(255,145,77,.28);
      transition:.2s ease;
      white-space:nowrap;
    }
    .points-entry-btn:hover{transform:translateY(-1px);filter:brightness(1.05);}
    .cheat-entry-btn{margin-right:8px;border-radius:999px;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.08);color:#fff;font-weight:700;font-size:13px;padding:8px 12px;cursor:pointer;}
    .cheat-entry-btn:hover{background:rgba(255,255,255,.16);}
    /* 去掉五一banner样式 */
    /* notice modal 样式 */
    .notice-modal {
      position: fixed;
      inset: 0;
      z-index: 999999;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
    }
    .notice-box {
      width: min(92vw,480px);
      border-radius: 16px;
      background: linear-gradient(135deg,#ff7a45 0%,#ff9c2e 50%,#ff4d4f 100%);
      color:#fff;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      padding: 28px 22px;
    }
    .notice-box h3 {
      margin:0;
      font-size:20px;
      font-weight:900;
      text-align:center;
    }
    .notice-box p {
      font-size:14px;
      line-height:1.6;
      margin: 16px 0;
    }
    .notice-btns {
      text-align:center;
      margin-top: 20px;
      display:flex;
      justify-content:center;
      gap:12px;
    }
    .notice-btns button {
      border:none;
      border-radius:8px;
      padding:8px 16px;
      font-weight:700;
      cursor:pointer;
      font-size:14px;
    }
    .notice-link{background:#fff;color:#ff4d4f;}
    .notice-cancel{background:rgba(255,255,255,0.2);color:#fff;border:1px solid rgba(255,255,255,0.5);}
  </style>
</head>
<body>

  <!-- 运营公告弹窗 -->
  <div id="noticeModal" class="notice-modal">
    <div class="notice-box">
      <h3>运营公告</h3>
      <p>
        因战略升级，匿语阁 (Babble) 网页版将于 <strong>2026 年 5 月 23 日</strong> 起暂停服务。<br>
        四个月间，我们记录了同学们的心声与告白，这次暂停是为了更好的重生。<br>
        敬请期待全新校园社交平台「匿语 ONE」六月回归。<br>
        感谢支持与包容！—— 匿语阁团队
      </p>
      <div class="notice-btns">
        <button class="notice-link" type="button" onclick="window.open('https://sps.yy-gp.com/hgakv/i.html','_blank')">完整公告</button>
        <button class="notice-cancel" type="button" onclick="document.getElementById('noticeModal').style.display='none'">取消</button>
      </div>
    </div>
  </div>

  <div id="emergencyOverlay" class="emergency-overlay">
    <div class="emergency-panel">
      <div class="emergency-tag">EMERGENCY SCREEN / 预留突发情况页</div>
      <h1 class="emergency-title">检测到突发情况</h1>
      <div class="emergency-divider"></div>
      <div class="emergency-lines">
        <div class="emergency-line">服务已终止</div>
        <div class="emergency-line">我们已介入调查</div>
        <div class="emergency-line">请稍安勿躁</div>
      </div>
    </div>
  </div>
  <!-- 主导航，仅保留一份 -->
  <nav class="top-nav">
    <a href="/message" class="nav-brand">
      <span class="nav-brand-main">匿语阁</span>
      <span class="nav-brand-sub">BABBLE</span>
    </a>
    <div class="nav-center">
      <button class="nav-link guild-nav-link" type="button" onclick="showComingSoon('匿语荟 · 交流新方式')">
        ✦ 匿语荟 <span>交流新方式</span>
      </button>
    </div>
    <div class="nav-actions">
      <button class="points-entry-btn" type="button" onclick="openPointsModalByEntry()">👑 成长进度</button>
      <button class="cheat-entry-btn" type="button" onclick="openCheatModal()">⚙ 特殊码</button>
      <button id="themeToggle" class="theme-toggle" type="button">🌙 暗色主题</button>
    </div>
  </nav>

  <div id="toast" class="success-toast">
    <span id="toastText">发送成功</span>
    <button class="close-btn" type="button" onclick="hideToast()">×</button>
  </div>

  <div class="main" id="mainPage">
    <div id="authPanel">
      <div id="authNotLogin" style="display:none;">
        <input id="loginUsername" type="text" placeholder="用户名">
        <input id="loginPassword" type="password" placeholder="密码">
        <input id="loginInviter" type="text" placeholder="邀请人用户名（可选）">
        <button class="submit" type="button" onclick="doRegister()">注册</button>
        <button class="submit" type="button" onclick="doLogin()">登录</button>
      </div>
      <div id="authLogged" style="display:none;">
        当前账号：
        <span class="inline-user-info"><span id="currentUser" style="font-weight:bold;"></span></span>
        <button class="submit" type="button" onclick="doChangeUsername()">修改用户名</button>
        <button class="submit" type="button" onclick="doDeleteAccount()">注销账号</button>
        <button class="submit" type="button" onclick="doLogout()">退出</button>
      </div>
    </div> 

    <div id="pointsTopbar" class="points-topbar" style="display:none;">
      <span id="pointsTopbarText">积分：0 / 100</span>
      <span id="pointsTopbarBadge"></span>
    </div>

    <div class="anonymous-info">💬 无需登录即可匿名发帖</div>

    <form id="mainForm" enctype="multipart/form-data">
      <textarea class="todo" name="content" placeholder="写点什么..." required></textarea>
      <div class="upload-wrapper">
        <button id="vipUploadBtn" class="image-upload-btn" type="button">
          <span class="vip-crown">👑</span>上传图片
        </button>
        <input id="imageInput" type="file" name="image" accept="image/*">
        <div id="imageFileName" class="image-file-name">未选择图片</div>
      </div>
      <input type="hidden" name="member_code" id="memberCodeHidden" value="">
      <div class="button-group">
        <button class="submit main-submit-btn" type="submit">匿名发帖</button>
        <button class="submit" type="button" onclick="openMemberModal()">
          <span class="vip-crown">👑</span>炫彩背景
        </button>
      </div>
    </form>

    <div id="listContainer"></div>
  </div>

  <script>
    const EMERGENCY_MODE = false;
    let me = null;
    let pointsState = {
      points: 0,
      is_member: false,
      today_signed: false,
      today_theme_rewarded: false
    };

    function showComingSoon(name='该功能'){
      if(emergencyBlocked())return;
      document.getElementById('comingSoonModal').style.display='flex';
    }

    function hideToast(){document.getElementById('toast').classList.remove('show');}
    function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastText').innerText=msg||'操作成功';t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
    function esc(s=''){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

    async function refreshMe(){
      const res=await fetch('/me');const data=await res.json();
      me=data.logged_in?data.username:null;
      const n=document.getElementById('authNotLogin'),l=document.getElementById('authLogged'),c=document.getElementById('currentUser');
      if(me){n.style.display='none';l.style.display='inline-flex';c.innerText=me;}
      else{l.style.display='none';n.style.display='inline-flex';}
    }

    async function openPointsModalByEntry(){
      if(!me){showToast('请先登录后查看积分');return;}
      const res=await fetch('/points_status');const data=await res.json();
      if(data.status==='ok'){
        let p=data.points||0;let bar=document.getElementById('pointsProgressBar');
        if(bar)bar.style.width=Math.min(p,100)+'%';
        showToast('积分：'+p+'/100');
      }
    }

    async function openCheatModal(){
      if(!me){showToast('请先登录');return;}
      document.getElementById('cheatModal').style.display='flex';
    }

    async function doLogin(){
      const u=document.getElementById('loginUsername').value.trim();
      const p=document.getElementById('loginPassword').value.trim();
      if(!u||!p)return alert('请输入用户名和密码');
      const fd=new FormData();fd.append('username',u);fd.append('password',p);
      const res=await fetch('/login',{method:'POST',body:fd});const data=await res.json();
      if(data.status==='ok'){showToast('登录成功');await refreshMe();await loadMessages();}
      else alert(data.message||'登录失败');
    }
    async function doRegister(){const u=document.getElementById('loginUsername').value.trim();const p=document.getElementById('loginPassword').value.trim();if(!u||!p)return alert('请输入用户名和密码');const fd=new FormData();fd.append('username',u);fd.append('password',p);const res=await fetch('/register',{method:'POST',body:fd});const data=await res.json();showToast(data.status==='ok'?'注册成功，请登录':'注册失败');}
    async function doLogout(){const res=await fetch('/logout',{method:'POST'});const data=await res.json();if(data.status==='ok'){showToast('已退出');await refreshMe();await loadMessages();}}
    async function doDeleteAccount(){if(!confirm('确认注销账号？'))return;const res=await fetch('/delete_account',{method:'POST'});const data=await res.json();showToast(data.status==='ok'?'账号已注销':'注销失败');await refreshMe();await loadMessages();}

    async function loadMessages(){
      const c=document.getElementById('listContainer');
      const res=await fetch('/messages');const data=await res.json();
      if(data.status!=='ok'){c.innerHTML='<div>加载失败</div>';return;}
      const list=data.messages||[];if(!list.length){c.innerHTML='<div class="no-messages">暂无留言</div>';return;}
      c.innerHTML=list.map(m=>{
        const premiumCls=Number(m.is_premium)?'premium-bg':'';const badge=Number(m.is_premium)?'<span class="plus-badge"><span class="vip-crown">👑</span>会员</span>':'';
        return `<div class="message ${premiumCls}">
          <div class="message-head"><div class="date">#${m.id} · ${esc(m.username||'匿名')} ${badge} · ${esc(m.date||'')}</div></div>
          <div class="content">${esc(m.content||'')}</div>
        </div>`;
      }).join('');
    }

    function initTheme(){
      const t=localStorage.getItem('theme')||'light';
      document.documentElement.setAttribute('data-theme',t);
      document.getElementById('themeToggle').innerText=t==='dark'?'🎨 原本主题':'🌙 暗色主题';
    }
    document.getElementById('themeToggle').addEventListener('click',()=>{
      const cur=document.documentElement.getAttribute('data-theme');
      const next=cur==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',next);localStorage.setItem('theme',next);
      document.getElementById('themeToggle').innerText=next==='dark'?'🎨 原本主题':'🌙 暗色主题';
    });

    // 页面初始化：刷新用户与内容
    (async function init(){
      initTheme();
      await refreshMe();
      await loadMessages();
      // 出示公告
      const nm=document.getElementById('noticeModal');
      if(nm) setTimeout(()=>nm.style.display='flex',600);
    })();
  </script>
</body>
</html>
