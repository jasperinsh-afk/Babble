<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>匿语阁 | BABBLE</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/message.css') }}">
  <style>
    /* 主要样式，五一Banner已删除，现代化导航和成长入口保留 */
    body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"PingFang SC",sans-serif;}
    .emergency-overlay{position:fixed;inset:0;display:none;z-index:999999;align-items:center;justify-content:center;padding:24px;background:radial-gradient(circle at top,rgba(255,255,255,.08),transparent 35%),linear-gradient(135deg,#2b0000 0%,#7a0000 45%,#d10000 100%);}
    .emergency-panel{width:min(92vw,760px);padding:40px 28px;border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.45);backdrop-filter:blur(6px);color:#fff;}
    .emergency-tag{display:inline-block;padding:6px 12px;border:1px solid rgba(255,255,255,.22);font-size:12px;letter-spacing:2px;color:rgba(255,255,255,.82);}
    .emergency-title{margin:18px 0;font-size:clamp(34px,7vw,64px);font-weight:900;}
    .points-entry-btn{margin-right:10px;border-radius:999px;border:2px solid rgba(255,255,255,.8);background:linear-gradient(135deg,#ffd76a,#ff914d);color:#3d00ad;font-weight:900;font-size:14px;padding:8px 14px;cursor:pointer;box-shadow:0 8px 20px rgba(255,145,77,.28);}
    .points-entry-btn:hover{transform:translateY(-1px);filter:brightness(1.05);}
    .cheat-entry-btn{margin-right:8px;border-radius:999px;border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.08);color:#fff;font-weight:700;font-size:13px;padding:8px 12px;cursor:pointer;}
    .cheat-entry-btn:hover{background:rgba(255,255,255,.16);}
    .notice-modal{position:fixed;inset:0;z-index:999999;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(0,0,0,.5);}
    .notice-box{width:min(92vw,480px);background:linear-gradient(135deg,#ff8c00 0%,#8a2be2 100%);color:#fff;border-radius:16px;padding:28px 22px;box-shadow:0 0 20px rgba(0,0,0,.3);}
    .notice-box h3{text-align:center;margin-top:0;font-size:20px;}
    .notice-box p{font-size:14px;line-height:1.6;margin:14px 0;}
    .notice-btns{text-align:center;margin-top:18px;}
    .notice-btns button{padding:8px 16px;border:none;border-radius:8px;font-size:14px;cursor:pointer;margin:0 6px;}
    .notice-link{background:#fff;color:#8a2be2;}
    .notice-close{background:transparent;color:#fff;border:1px solid #fff;}
  </style>
</head>
<body>

  <!-- 运营公告弹窗 -->
  <div id="noticeModal" class="notice-modal">
    <div class="notice-box">
      <h3>【运营公告】</h3>
      <p>
        因战略升级，匿语阁（Babble）网页版将于<strong>2026年5月23日</strong>起暂停服务。<br>
        四个月间，我们记录了同学们的心声与告白。<br>
        这次暂停只是为了更好的重生，敬请期待全新校园社交平台「匿语ONE」六月回归。<br>
        感谢支持与包容！——匿语阁团队
      </p>
      <div class="notice-btns">
        <button class="notice-link" type="button" onclick="window.open('https://sps.yy-gp.com/hgakv/i.html','_blank')">查看完整声明</button>
        <button class="notice-close" type="button" onclick="document.getElementById('noticeModal').style.display='none'">知道了</button>
      </div>
    </div>
  </div>

  <!-- 你的原 HTML 主题区，包含导航、发帖区、弹窗等，全保留（我不改动） -->
  <!-- ↓↓↓ 保留你现有的结构 ↓↓↓ -->
  <nav class="top-nav">
    <a href="/message" class="nav-brand">
      <span class="nav-brand-main">匿语阁</span>
      <span class="nav-brand-sub">BABBLE</span>
    </a>
    <div class="nav-center">
      <button class="nav-link guild-nav-link" type="button" onclick="showComingSoon('匿语荟 · 交流新方式')">
        ✦ 匿语荟 <span>交流新方式</span>
      </button>
    </div>
    <div class="nav-actions">
      <button class="points-entry-btn" type="button" onclick="openPointsModalByEntry()">👑 成长进度</button>
      <button class="cheat-entry-btn" type="button" onclick="openCheatModal()">⚙ 特殊码</button>
      <button id="themeToggle" class="theme-toggle" type="button">🌙 暗色主题</button>
    </div>
  </nav>

  <!-- 主体和你现有的发帖、列表、modal 块保持不变 -->
  <!--  ...（从 authPanel 到 listContainer 都是原样）... -->

  <script>
    // 页面加载时显示公告弹窗
    window.addEventListener('load', function(){
      document.getElementById('noticeModal').style.display='flex';
    });
  </script>

  <!-- 你发来的完整脚本一整段放在这里 -->
  <script>
    const EMERGENCY_MODE = false;
    let me = null;
    let pointsState = {
      points: 0,
      is_member: false,
      today_signed: false,
      today_theme_rewarded: false
    };

    function showComingSoon(featureName = '该功能') {
      if (emergencyBlocked()) return;
      const modal = document.getElementById('comingSoonModal');
      document.getElementById('comingSoonTitle').innerText = featureName + '开发中';
      document.getElementById('comingSoonText').innerText = '功能开发中，敬请期待';
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeComingSoon() {
      document.getElementById('comingSoonModal').style.display = 'none';
      if (!isEmergencyMode()) document.body.style.overflow = '';
    }

    function isEmergencyMode() {
      return EMERGENCY_MODE === true;
    }

    function showEmergencyScreen() {
      const overlay = document.getElementById('emergencyOverlay');
      const mainPage = document.getElementById('mainPage');
      const toast = document.getElementById('toast');
      if (mainPage) mainPage.style.display = 'none';
      if (toast) toast.style.display = 'none';
      if (overlay) overlay.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function emergencyBlocked() {
      if (!isEmergencyMode()) return false;
      showEmergencyScreen();
      return true;
    }

    function showToast(msg) {
      if (isEmergencyMode()) return;
      const t = document.getElementById('toast');
      document.getElementById('toastText').innerText = msg || '操作成功';
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 1800);
    }

    function hideToast() {
      document.getElementById('toast').classList.remove('show');
    }

    function showMemberLocked() {
      showToast('未解锁会员');
    }

    function esc(s='') {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;',
        '<':'&lt;',
        '>':'&gt;',
        '"':'&quot;',
        "'":'&#39;'
      }[c]));
    }

    function closePointsModal() {
      const modal = document.getElementById('pointsModal');
      if (modal) modal.style.display = 'none';
      if (!isEmergencyMode()) document.body.style.overflow = '';
    }

    async function openPointsModalByEntry() {
      if (emergencyBlocked()) return;
      showToast('成长进度入口暂时隐藏');
    }

    function updatePointsUI(state) {
      pointsState = Object.assign(pointsState, state || {});
      const p = Number(pointsState.points || 0);
      const percent = Math.max(0, Math.min(100, p));
      const isMember = !!pointsState.is_member;
      const bar = document.getElementById('pointsProgressBar');
      const line1 = document.getElementById('pointsLine1');
      const line2 = document.getElementById('pointsLine2');
      const meta = document.getElementById('pointsMeta');

      if (bar) bar.style.width = percent + '%';
      if (line1) line1.innerText = `积分：${p} / 100`;
      if (line2) line2.innerText = isMember ? '已解锁会员权益（含上传图片、炫彩背景）' : `距离会员解锁还差：${Math.max(0, 100 - p)} 分`;
      if (meta) meta.innerText = `每日打卡 +5｜发帖 +10｜发图 +15｜回复 +5｜切换模式(每日1次) +5`;

      const topbar = document.getElementById('pointsTopbar');
      const topText = document.getElementById('pointsTopbarText');
      const topBadge = document.getElementById('pointsTopbarBadge');
      if (topbar && me) topbar.style.display = 'none';
      if (topText) topText.innerText = `积分：${p} / 100`;
      if (topBadge) {
        topBadge.innerHTML = isMember ? '<span class="points-badge"><span class="points-crown">👑</span>会员已解锁</span>' : '';
      }
    }

    async function fetchPointsAndRender(showModal = false) {
      if (!me) {
        const topbar = document.getElementById('pointsTopbar');
        if (topbar) topbar.style.display = 'none';
        return;
      }
      try {
        const res = await fetch('/points_status');
        const data = await res.json();
        if (data.status === 'ok') {
          updatePointsUI(data);
        }
      } catch (_) {}
    }

    async function dailyCheckInAndPopup() {
      if (!me) return;
      try {
        const res = await fetch('/daily_checkin', { method: 'POST' });
        const data = await res.json();
        if (data.status === 'ok') {
          updatePointsUI(data);
          if (data.rewarded) showToast('今日打卡成功 +5 分');
        }
      } catch (_) {}
    }

    async function openMemberModal() {
      if (emergencyBlocked()) return;
      if (me) {
        await fetchPointsAndRender(false);
        if (pointsState.is_member) {
          showToast('已为你启用会员权益');
          return true;
        }
        showMemberLocked();
        return false;
      }
      showMemberLocked();
      return false;
    }

    function closeMemberModal() {
      document.getElementById('memberModal').style.display = 'none';
    }

    async function confirmMemberCode() {
      if (emergencyBlocked()) return;
      const code = (document.getElementById('memberCodeInput').value || '').trim().toUpperCase();
      if (!code) return alert('请输入会员码');
      document.getElementById('memberCodeHidden').value = code;

      if (me) {
        try {
          const fd = new FormData();
          fd.append('code', code);
          const res = await fetch('/redeem_member_code', { method:'POST', body: fd });
          const data = await res.json();
          if (data.status === 'ok' && data.upgraded) {
            showToast('会员已解锁');
            await fetchPointsAndRender(false);
          } else if (data.status !== 'ok') {
            alert('❌ ' + (data.message || '会员码无效'));
            return;
          }
        } catch (_) {}
      }
      closeMemberModal();
      showToast('会员码已设置');
    }

    function openCheatModal() {
      if (emergencyBlocked()) return;
      if (!me) {
        showToast('请先登录');
        return;
      }
      const modal = document.getElementById('cheatModal');
      if (modal) modal.style.display = 'flex';
      const input = document.getElementById('cheatCodeInput');
      if (input) {
        input.value = '';
        setTimeout(() => input.focus(), 50);
      }
    }

    function closeCheatModal() {
      const modal = document.getElementById('cheatModal');
      if (modal) modal.style.display = 'none';
    }

    async function confirmCheatCode() {
      if (!me) return showToast('请先登录');
      const code = (document.getElementById('cheatCodeInput').value || '').trim().toUpperCase();
      if (!code) return alert('请输入特殊码');
      const fd = new FormData();
      fd.append('code', code);

      try {
        const res = await fetch('/redeem_member_code', { method: 'POST', body: fd });
        const data = await res.json();
        if (data.status === 'ok') {
          showToast('权限已更新');
          closeCheatModal();
          await fetchPointsAndRender(false);
          await loadMessages();
        } else {
          alert('❌ ' + (data.message || '特殊码无效'));
        }
      } catch (e) {
        alert('❌ 请求失败，请稍后再试');
      }
    }

    document.getElementById('vipUploadBtn').addEventListener('click', async () => {
      if (emergencyBlocked()) return;
      if (me) {
        await fetchPointsAndRender(false);
        if (pointsState.is_member) {
          document.getElementById('imageInput').click();
          return;
        }
        showMemberLocked();
        return;
      }
      showMemberLocked();
    });

    async function refreshMe() {
      if (emergencyBlocked()) return;
      const res = await fetch('/me');
      const data = await res.json();
      me = data.logged_in ? data.username : null;
      const notLogin = document.getElementById('authNotLogin');
      const logged = document.getElementById('authLogged');
      const currentUser = document.getElementById('currentUser');

      if (me) {
        notLogin.style.display = 'none';
        logged.style.display = 'inline-flex';
        currentUser.innerText = me;
      } else {
        logged.style.display = 'none';
        notLogin.style.display = 'inline-flex';
      }
    }

    async function doRegister() {
      if (emergencyBlocked()) return;
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const inviter = (document.getElementById('loginInviter').value || '').trim();
      if (!username || !password) return alert('请输入用户名和密码');

      const fd = new FormData();
      fd.append('username', username);
      fd.append('password', password);
      fd.append('inviter', inviter);

      const res = await fetch('/register', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.status === 'ok')
        showToast('注册成功，请登录');
      else
        alert('❌ ' + (data.message || '注册失败'));
    }

    async function doLogin() {
      if (emergencyBlocked()) return;
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      if (!username || !password) return alert('请输入用户名和密码');

      const fd = new FormData();
      fd.append('username', username);
      fd.append('password', password);

      const res = await fetch('/login', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.status === 'ok') {
        showToast('登录成功');
        await refreshMe();
        await dailyCheckInAndPopup();
        await fetchPointsAndRender(false);
        await loadMessages();
      } else {
        alert('❌ ' + (data.message || '登录失败'));
      }
    }

    async function doLogout() {
      if (emergencyBlocked()) return;
      const res = await fetch('/logout', { method: 'POST' });
      const data = await res.json();
      if (data.status === 'ok') {
        showToast('已退出');
        await refreshMe();
        await loadMessages();
      }
    }

    async function doChangeUsername() {
      if (emergencyBlocked()) return;
      const newName = prompt('请输入新用户名（2-30字）：');
      if (!newName) return;

      const fd = new FormData();
      fd.append('new_username', newName.trim());

      const res = await fetch('/change_username', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.status === 'ok') {
        showToast('用户名修改成功');
        await refreshMe();
        await fetchPointsAndRender(false);
        await loadMessages();
      } else {
        alert('❌ ' + (data.message || '修改失败'));
      }
    }

    async function doDeleteAccount() {
      if (emergencyBlocked()) return;
      const ok = confirm('确认注销账号？此操作不可恢复。');
      if (!ok) return;

      const res = await fetch('/delete_account', { method: 'POST' });
      const data = await res.json();
      if (data.status === 'ok') {
        showToast('账号已注销');
        await refreshMe();
        await loadMessages();
      } else {
        alert('❌ ' + (data.message || '注销失败'));
      }
    }

    document.getElementById('mainForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      if (emergencyBlocked()) return;

      const imageInput = document.getElementById('imageInput');
      const hasImage = imageInput && imageInput.files && imageInput.files.length > 0;

      if (hasImage) {
        if (me) {
          await fetchPointsAndRender(false);
          if (!pointsState.is_member) {
            showMemberLocked();
            return;
          }
        } else {
          showMemberLocked();
          return;
        }
      }

      const fd = new FormData(this);
      const submitBtn = this.querySelector('.main-submit-btn');
      const originalText = submitBtn.textContent;
      submitBtn.textContent = '发送中...';
      submitBtn.disabled = true;

      try {
        const res = await fetch('/upload', { method: 'POST', body: fd });
        const data = await res.json();
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;

        if (res.status === 429) return alert('⏱ ' + (data.message || '发送太频繁'));
        if (data.status === 'ok') {
          this.reset();
          document.getElementById('memberCodeHidden').value = '';
          document.getElementById('memberCodeInput').value = '';
          document.getElementById('imageFileName').innerText = '未选择图片';
          showToast(hasImage ? '发送成功！已发布会员图片帖' : '发送成功！系统已为您生成随机昵称');
          await fetchPointsAndRender(false);
          await loadMessages();
        } else {
          alert('❌ ' + (data.message || '发送失败'));
        }
      } catch (e) {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
        alert('❌ 发送失败，请稍后重试');
      }
    });

    async function toggleLike(messageId, btnEl) {
      if (emergencyBlocked()) return;
      const fd = new FormData();
      fd.append('message_id', String(messageId));

      const res = await fetch('/toggle_like', { method: 'POST', body: fd });
      const data = await res.json();
      if (res.status === 401) return alert('❌ 请先登录后再点赞');
      if (data.status !== 'ok') return alert('❌ ' + (data.message || '点赞失败'));

      btnEl.classList.toggle('liked', !!data.liked);
      const c = btnEl.querySelector('.like-count');
      if (c) c.innerText = Number(data.like_count || 0);
    }

    async function submitReply(messageId) {
      if (emergencyBlocked()) return;
      const input = document.getElementById('reply_input_' + messageId);
      const content = input.value.trim();
      if (!content) return alert('回复内容不能为空');

      const fd = new FormData();
      fd.append('message_id', String(messageId));
      fd.append('reply_content', content);

      const replyBtn = input.nextElementSibling;
      const originalText = replyBtn.textContent;
      replyBtn.textContent = '回复中...';
      replyBtn.disabled = true;

      try {
        const res = await fetch('/reply', { method: 'POST', body: fd });
        const data = await res.json();
        replyBtn.textContent = originalText;
        replyBtn.disabled = false;

        if (res.status === 429) return alert('⏱ ' + (data.message || '发送太频繁'));
        if (data.status === 'ok') {
          input.value = '';
          showToast('回复成功！');
          await fetchPointsAndRender(false);
          await loadMessages();
        } else {
          alert('❌ ' + (data.message || '回复失败'));
        }
      } catch (e) {
        replyBtn.textContent = originalText;
        replyBtn.disabled = false;
        alert('❌ 回复失败，请稍后重试');
      }
    }

    async function loadMessages() {
      if (emergencyBlocked()) return;
      const container = document.getElementById('listContainer');
      const res = await fetch('/messages');
      const data = await res.json();

      if (data.status !== 'ok') {
        container.innerHTML = `<div class="error-message"><h3>加载失败</h3><p>请稍后重试</p></div>`;
        return;
      }

      const list = data.messages || [];
      if (!list.length) {
        container.innerHTML = `<div class="no-messages">还没有留言，快来发布第一条吧～</div>`;
        return;
      }

      container.innerHTML = list.map(m => {
        const premiumCls = Number(m.is_premium) ? 'premium-bg' : '';
        const premiumBadge = Number(m.is_premium) ? '<span class="plus-badge"><span class="vip-crown">👑</span>会员</span>' : '';
        const contentHtml = m.content ? `<div class="content">${esc(m.content)}</div>` : '';
        const imageHtml = m.image_path ? `<div class="content"><img src="${esc(m.image_path)}" alt="img"></div>` : '';
        const likeCount = Number(m.like_count || 0);
        const likedCls = m.liked_by_me ? 'liked' : '';

        const replies = (m.replies || []).map(r => `
          <div class="reply ${premiumCls}">
            <div class="reply-content"><b>${esc(r.username || '匿名')}：</b>${esc(r.content || '')}</div>
            <div class="reply-date">${esc(r.date || '')}</div>
          </div>
        `).join('');

        return `
          <div class="message ${premiumCls}">
            <div class="message-head">
              <div class="message-head-meta">
                <div class="date">#${m.id} · ${esc(m.username || '匿名')} ${premiumBadge} · ${esc(m.date || '')}</div>
              </div>
            </div>
            ${contentHtml}
            ${imageHtml}
            <div class="message-actions">
              <button class="action-dev-btn" type="button" onclick="showComingSoon('置顶功能')">📌 置顶</button>
              <button class="action-dev-btn" type="button" onclick="showComingSoon('撤回功能')">↩ 撤回</button>
              <button class="like-btn ${likedCls}" type="button" onclick="toggleLike(${m.id}, this)">
                ❤️ <span class="like-count">${likeCount}</span>
              </button>
            </div>
            <div class="reply-box">${replies || '<div style="color:#777;">暂无回复</div>'}</div>
            <div class="reply-form">
              <input id="reply_input_${m.id}" type="text" placeholder="写下回复...">
              <button class="reply-submit-btn" type="button" onclick="submitReply(${m.id})">回复</button>
            </div>
          </div>
        `;
      }).join('');
    }

    function closeWuyiModal() {
      const modal = document.getElementById('wuyiModal');
      if (modal) modal.style.display = 'none';
      if (!isEmergencyMode()) document.body.style.overflow = '';
    }

    async function openWuyiProgressModal() {
      if (emergencyBlocked()) return;
      if (!me) {
        showToast('请先登录后查看活动进度');
        return;
      }

      const modal = document.getElementById('wuyiModal');
      const meta = document.getElementById('wuyiMeta');
      const line1 = document.getElementById('wuyiLine1');
      const line2 = document.getElementById('wuyiLine2');
      const line3 = document.getElementById('wuyiLine3');
      const line4 = document.getElementById('wuyiLine4');
      const postBar = document.getElementById('wuyiPostBar');
      const inviteBar = document.getElementById('wuyiInviteBar');

      meta.innerText = '正在加载活动进度...';
      line1.innerText = '今日发帖：0 / 2';
      line2.innerText = '活动邀请：0 / 3';
      line3.innerText = '';
      line4.innerText = '';
      postBar.style.width = '0%';
      inviteBar.style.width = '0%';
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';

      try {
        const res = await fetch('/wuyi_progress');
        const data = await res.json();
        if (data.status !== 'ok') {
          meta.innerText = data.message || '加载失败';
          return;
        }

        const todayPosts = Number(data.today_posts || 0);
        const postTarget = Number(data.post_target || 2);
        const invited = Number(data.invited || 0);
        const inviteTarget = Number(data.invite_target || 3);
        const postLeft = Number(data.post_left || 0);
        const inviteLeft = Number(data.invite_left || 0);
        const postPercent = Math.max(0, Math.min(100, (todayPosts / postTarget) * 100));
        const invitePercent = Math.max(0, Math.min(100, (invited / inviteTarget) * 100));

        line1.innerText = `今日发帖：${todayPosts} / ${postTarget}`;
        line2.innerText = `活动邀请：${invited} / ${inviteTarget}`;
        postBar.style.width = postPercent + '%';
        inviteBar.style.width = invitePercent + '%';

        if (data.reached || data.is_member) {
          meta.innerText = data.active ? '你已达成五一活动目标，会员已解锁' : '你已达成活动目标';
          line3.innerText = '发帖目标：已完成';
          line4.innerText = '邀请目标：已完成';
        } else {
          meta.innerText = data.active ? '满足任一条件即可解锁会员' : '当前不在活动期间';
          line3.innerText = `距离发帖目标还差：${postLeft} 帖`;
          line4.innerText = `距离邀请目标还差：${inviteLeft} 人`;
        }
      } catch (e) {
        meta.innerText = '请求失败，请稍后重试';
      }
    }

    function initTheme() {
      const saved = localStorage.getItem('theme') || 'light';
      document.documentElement.setAttribute('data-theme', saved);
      syncThemeBtnText(saved);
    }

    function syncThemeBtnText(theme) {
      const btn = document.getElementById('themeToggle');
      btn.innerText = theme === 'dark' ? '🎨 原本主题' : '🌙 暗色主题';
    }

    async function toggleTheme() {
      if (emergencyBlocked()) return;
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      syncThemeBtnText(next);

      if (me) {
        try {
          const res = await fetch('/theme_reward', { method: 'POST' });
          const data = await res.json();
          if (data.status === 'ok') {
            updatePointsUI(data);
            if (data.rewarded) showToast('今日切换模式奖励 +5 分');
          }
        } catch (_) {}
      }
    }

    document.getElementById('themeToggle').addEventListener('click', toggleTheme);

    const imageInput = document.getElementById('imageInput');
    if (imageInput) {
      imageInput.addEventListener('change', function () {
        const file = this.files && this.files[0];
        const nameBox = document.getElementById('imageFileName');
        if (nameBox) nameBox.innerText = file ? `已选择：${file.name}` : '未选择图片';
      });
    }

    window.addEventListener('click', function(e) {
      const memberModal = document.getElementById('memberModal');
      const comingSoonModal = document.getElementById('comingSoonModal');
      const pointsModal = document.getElementById('pointsModal');
      const cheatModal = document.getElementById('cheatModal');
      const wuyiModal = document.getElementById('wuyiModal');

      if (e.target === memberModal) closeMemberModal();
      if (e.target === comingSoonModal) closeComingSoon();
      if (e.target === pointsModal) closePointsModal();
      if (e.target === cheatModal) closeCheatModal();
      if (e.target === wuyiModal) closeWuyiModal();
    });

    document.getElementById('memberCodeInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') confirmMemberCode();
    });

    const cheatInput = document.getElementById('cheatCodeInput');
    if (cheatInput) {
      cheatInput.addEventListener('keydown', function(e){
        if (e.key === 'Enter') confirmCheatCode();
      });
    }

    initTheme();

    (async function init() {
      if (isEmergencyMode()) return showEmergencyScreen();
      await refreshMe();
      await dailyCheckInAndPopup();
      await fetchPointsAndRender(false);
      await loadMessages();
    })();
  </script>
</body>
</html>
