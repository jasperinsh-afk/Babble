<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>匿语阁 | BABBLE</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/message.css') }}">

    <style>
        .emergency-overlay{
            position: fixed;
            inset: 0;
            z-index: 999999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(255,255,255,0.08), transparent 35%),
                linear-gradient(135deg, #2b0000 0%, #7a0000 45%, #d10000 100%);
            overflow: hidden;
        }

        .emergency-overlay::before,
        .emergency-overlay::after{
            content: "";
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .emergency-overlay::before{
            background:
                repeating-linear-gradient(
                    180deg,
                    rgba(255,255,255,0.03) 0px,
                    rgba(255,255,255,0.03) 2px,
                    transparent 2px,
                    transparent 6px
                );
            mix-blend-mode: overlay;
            opacity: 0.35;
        }

        .emergency-overlay::after{
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.35) 100%);
        }

        .emergency-panel{
            position: relative;
            z-index: 2;
            width: min(92vw, 760px);
            padding: 40px 28px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(6px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
                         "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        .emergency-tag{
            display: inline-block;
            margin-bottom: 18px;
            padding: 6px 12px;
            border: 1px solid rgba(255,255,255,0.22);
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.82);
            background: rgba(255,255,255,0.06);
        }

        .emergency-title{
            margin: 0 0 18px;
            font-size: clamp(34px, 7vw, 64px);
            font-weight: 900;
            line-height: 1.06;
            letter-spacing: 1px;
            color: #fff;
        }

        .emergency-divider{
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.6), rgba(255,255,255,0.08));
            margin: 18px 0 26px;
        }

        .emergency-lines{
            display: grid;
            gap: 12px;
        }

        .emergency-line{
            font-size: clamp(20px, 3.2vw, 30px);
            font-weight: 700;
            color: rgba(255,255,255,0.9);
            letter-spacing: 1px;
        }

        .emergency-blink{
            display: inline-block;
            color: #ffd6d6;
            animation: emergencyBlink 1.2s infinite;
        }

        @keyframes emergencyBlink{
            0%, 49% { opacity: 1; }
            50%, 100% { opacity: 0.35; }
        }

        @media (max-width: 640px){
            .emergency-panel{
                padding: 28px 20px;
            }

            .emergency-line{
                line-height: 1.4;
            }
        }
    </style>
</head>
<body>
    <!-- 红屏预留页 -->
    <div id="emergencyOverlay" class="emergency-overlay">
        <div class="emergency-panel">
            <div class="emergency-tag">EMERGENCY SCREEN / 预留突发情况页</div>
            <h1 class="emergency-title">检测到突发情况</h1>
            <div class="emergency-divider"></div>
            <div class="emergency-lines">
                <div class="emergency-line">服务已终止</div>
                <div class="emergency-line">我们已介入调查</div>
                <div class="emergency-line">请稍安勿躁 <span class="emergency-blink">●</span></div>
            </div>
        </div>
    </div>

    <div class="header">
        <a href="/message">匿语阁 | BABBLE</a>

        <div id="avatarBox" class="avatar-box" style="display:none;">
            <div class="avatar-upload-tip">点击更换头像</div>
            <label for="avatarInput" class="avatar-label" title="上传头像">
                <img id="myAvatar" class="my-avatar" src="" alt="头像">
                <span class="avatar-online-dot"></span>
            </label>
            <input id="avatarInput" type="file" accept="image/png,image/jpeg,image/jpg,image/gif,image/webp" style="display:none;">
        </div>

        <button id="themeToggle" class="theme-toggle">🌙 暗色主题</button>
    </div>

    <!-- 顶部提示 -->
    <div id="toast" class="success-toast">
        <span id="toastText">发送成功</span>
        <button class="close-btn" onclick="hideToast()">×</button>
    </div>

    <!-- 会员码弹窗 -->
    <div id="memberModal" class="member-modal">
        <div class="modal-content">
            <h3>会员验证</h3>
            <p>输入会员码可发布炫彩会员帖</p>
            <input type="text" id="memberCodeInput" placeholder="请输入会员码">
            <div class="modal-buttons">
                <button class="modal-btn confirm" onclick="confirmMemberCode()">确认</button>
                <button class="modal-btn cancel" onclick="closeMemberModal()">取消</button>
            </div>
            <div class="hint">提示：会员码区分大小写已关闭（自动转大写）</div>
        </div>
    </div>

    <div class="main" id="mainPage">
        <h2 class="title">多谢使用匿语阁</h2>

        <!-- 登录注册区 -->
        <div id="authPanel">
            <div id="authNotLogin" style="display:none;">
                <input id="loginUsername" type="text" placeholder="用户名">
                <input id="loginPassword" type="password" placeholder="密码">
                <button class="submit" type="button" onclick="doRegister()">注册</button>
                <button class="submit" type="button" onclick="doLogin()">登录</button>
            </div>

            <div id="authLogged" style="display:none;">
                当前账号：
                <span class="inline-user-info">
                    <img id="currentUserAvatar" class="inline-user-avatar" src="" alt="avatar">
                    <span id="currentUser" style="font-weight:bold;"></span>
                </span>
                <button class="submit" type="button" onclick="doChangeUsername()" style="margin-left:8px;">
                    修改用户名
                </button>
                <button class="submit" type="button" onclick="doDeleteAccount()" style="margin-left:8px; background:#b00020; color:#fff;">
                    注销账号
                </button>
                <button class="submit" type="button" onclick="doLogout()" style="margin-left:8px;">退出</button>
            </div>
        </div>

        <!-- 匿名发帖说明 -->
        <div class="anonymous-info" style="
            background-color: var(--bg-message);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            margin: 15px auto;
            max-width: 800px;
            text-align: center;
            font-size: 16px;
            color: var(--text-secondary);
        ">
            💬 无需登录即可匿名发帖，系统将为您生成随机昵称
        </div>

        <!-- 发帖表单 -->
        <form id="mainForm" enctype="multipart/form-data">
            <textarea class="todo" name="content" placeholder="写点什么..." required></textarea>

            <!-- 如需上传图片可恢复
            <div class="upload-wrapper">
                <label for="imageInput">📷 上传图片（可选）</label>
                <input id="imageInput" type="file" name="image" accept="image/*">
            </div>
            -->

            <input type="hidden" name="member_code" id="memberCodeHidden" value="">

            <div class="button-group">
                <button class="submit" type="submit">匿名发帖</button>
                <!--
                <button class="member-btn" type="button" onclick="openMemberModal()">
                    炫彩背景
                    <span class="member-tag">会员专享</span>
                </button>
                -->
            </div>
        </form>

        <!-- 留言列表 -->
        <div id="listContainer"></div>
    </div>

<script>
const EMERGENCY_MODE = false; // 改成 true 即开启红屏预留页
let me = null;
let myAvatarPath = '';

const DEFAULT_AVATAR = 'data:image/svg+xml;utf8,' + encodeURIComponent(`
<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160">
  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ff914d"/>
      <stop offset="100%" stop-color="#5d3ea8"/>
    </linearGradient>
  </defs>
  <rect width="160" height="160" rx="80" fill="url(#g)"/>
  <circle cx="80" cy="62" r="28" fill="white" opacity="0.9"/>
  <path d="M35 136c8-30 28-46 45-46s37 16 45 46" fill="white" opacity="0.9"/>
</svg>
`);

function isEmergencyMode() {
    return EMERGENCY_MODE === true;
}

function showEmergencyScreen() {
    const overlay = document.getElementById('emergencyOverlay');
    const mainPage = document.getElementById('mainPage');
    const toast = document.getElementById('toast');

    if (mainPage) mainPage.style.display = 'none';
    if (toast) toast.style.display = 'none';
    if (overlay) overlay.style.display = 'flex';

    document.body.style.overflow = 'hidden';
}

function emergencyBlocked() {
    if (!isEmergencyMode()) return false;
    showEmergencyScreen();
    return true;
}

// ========== 通用 ==========
function showToast(msg) {
    if (isEmergencyMode()) return;
    const t = document.getElementById('toast');
    document.getElementById('toastText').innerText = msg || '操作成功';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
}
function hideToast() {
    document.getElementById('toast').classList.remove('show');
}
function esc(s='') {
    return String(s).replace(/[&<>"']/g, c => (
        {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
    ));
}
function avatarSrc(path) {
    return path && String(path).trim() ? path : DEFAULT_AVATAR;
}
function setMyAvatar(src) {
    const img = document.getElementById('myAvatar');
    const currentUserAvatar = document.getElementById('currentUserAvatar');
    const realSrc = avatarSrc(src);
    if (img) img.src = realSrc;
    if (currentUserAvatar) currentUserAvatar.src = realSrc;
}
function showAvatarBox(show) {
    const box = document.getElementById('avatarBox');
    if (!box) return;
    box.style.display = show ? 'flex' : 'none';
}
async function uploadAvatar(file) {
    if (emergencyBlocked()) return;
    if (!file) return;

    const allowTypes = ['image/png', 'image/jpeg', 'image/jpg', 'image/gif', 'image/webp'];
    if (!allowTypes.includes(file.type)) {
        alert('❌ 头像仅支持 png、jpg、jpeg、gif、webp 格式');
        return;
    }

    const maxSize = 3 * 1024 * 1024;
    if (file.size > maxSize) {
        alert('❌ 头像大小不能超过 3MB');
        return;
    }

    const fd = new FormData();
    fd.append('avatar', file);

    try {
        showToast('头像上传中...');
        const res = await fetch('/upload_avatar', {
            method: 'POST',
            body: fd
        });

        const data = await res.json();

        if (res.status === 401) {
            alert('❌ 请先登录后再上传头像');
            return;
        }

        if (data.status === 'ok') {
            myAvatarPath = data.avatar_path || '';
            setMyAvatar(myAvatarPath);
            showToast('头像更新成功');
            await loadMessages();
        } else {
            alert('❌ ' + (data.message || '头像上传失败'));
        }
    } catch (e) {
        alert('❌ 头像上传失败，请稍后重试');
    }
}

// ========== 会员弹窗 ==========
function openMemberModal() {
    if (emergencyBlocked()) return;
    document.getElementById('memberModal').style.display = 'flex';
}
function closeMemberModal() {
    document.getElementById('memberModal').style.display = 'none';
}
function confirmMemberCode() {
    if (emergencyBlocked()) return;
    const code = (document.getElementById('memberCodeInput').value || '').trim().toUpperCase();
    document.getElementById('memberCodeHidden').value = code;
    closeMemberModal();
    if (code) showToast('会员码已设置');
}

// ========== 登录态 ==========
async function refreshMe() {
    if (emergencyBlocked()) return;

    const res = await fetch('/me');
    const data = await res.json();
    me = data.logged_in ? data.username : null;
    myAvatarPath = data.avatar_path || '';

    const notLogin = document.getElementById('authNotLogin');
    const logged = document.getElementById('authLogged');
    const currentUser = document.getElementById('currentUser');

    if (me) {
        notLogin.style.display = 'none';
        logged.style.display = 'inline-flex';
        logged.style.alignItems = 'center';
        currentUser.innerText = me;
        setMyAvatar(myAvatarPath);
        showAvatarBox(true);
    } else {
        logged.style.display = 'none';
        notLogin.style.display = 'inline-flex';
        notLogin.style.gap = '8px';
        notLogin.style.alignItems = 'center';
        setMyAvatar('');
        showAvatarBox(false);
    }
}

async function doRegister() {
    if (emergencyBlocked()) return;
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) return alert('请输入用户名和密码');

    const fd = new FormData();
    fd.append('username', username);
    fd.append('password', password);

    const res = await fetch('/register', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.status === 'ok') {
        showToast('注册成功，请登录');
    } else {
        alert('❌ ' + (data.message || '注册失败'));
    }
}

async function doLogin() {
    if (emergencyBlocked()) return;
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!username || !password) return alert('请输入用户名和密码');

    const fd = new FormData();
    fd.append('username', username);
    fd.append('password', password);

    const res = await fetch('/login', { method: 'POST', body: fd });
    const data = await res.json();
    if (data.status === 'ok') {
        showToast('登录成功');
        await refreshMe();
        await loadMessages();
    } else {
        alert('❌ ' + (data.message || '登录失败'));
    }
}

async function doLogout() {
    if (emergencyBlocked()) return;
    const res = await fetch('/logout', { method: 'POST' });
    const data = await res.json();
    if (data.status === 'ok') {
        showToast('已退出');
        await refreshMe();
        await loadMessages();
    }
}

// 修改用户名
async function doChangeUsername() {
    if (emergencyBlocked()) return;
    const newName = prompt('请输入新用户名（2-30字）：');
    if (!newName) return;

    const fd = new FormData();
    fd.append('new_username', newName.trim());

    const res = await fetch('/change_username', { method: 'POST', body: fd });
    const data = await res.json();

    if (data.status === 'ok') {
        showToast('用户名修改成功');
        await refreshMe();
        await loadMessages();
    } else {
        alert('❌ ' + (data.message || '修改失败'));
    }
}

// 注销账号
async function doDeleteAccount() {
    if (emergencyBlocked()) return;
    const ok = confirm('确认注销账号？此操作不可恢复。');
    if (!ok) return;

    const res = await fetch('/delete_account', { method: 'POST' });
    const data = await res.json();

    if (data.status === 'ok') {
        showToast('账号已注销');
        await refreshMe();
        await loadMessages();
    } else {
        alert('❌ ' + (data.message || '注销失败'));
    }
}

// ========== 发帖 ==========
document.getElementById('mainForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    if (emergencyBlocked()) return;

    const fd = new FormData(this);

    const submitBtn = this.querySelector('.submit');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = '发送中...';
    submitBtn.disabled = true;

    try {
        const res = await fetch('/upload', { method: 'POST', body: fd });
        const data = await res.json();

        submitBtn.textContent = originalText;
        submitBtn.disabled = false;

        if (res.status === 429) return alert('⏱ ' + (data.message || '发送太频繁'));

        if (data.status === 'ok') {
            this.reset();
            document.getElementById('memberCodeHidden').value = '';
            showToast('发送成功！系统已为您生成随机昵称');
            await loadMessages();
        } else {
            alert('❌ ' + (data.message || '发送失败'));
        }
    } catch (e) {
        submitBtn.textContent = originalText;
        submitBtn.disabled = false;
        alert('❌ 发送失败，请稍后重试');
    }
});

// ========== 点赞 ==========
async function toggleLike(messageId, btnEl) {
    if (emergencyBlocked()) return;
    const fd = new FormData();
    fd.append('message_id', String(messageId));

    const res = await fetch('/toggle_like', { method: 'POST', body: fd });
    const data = await res.json();

    if (res.status === 401) return alert('❌ 请先登录后再点赞');
    if (data.status !== 'ok') return alert('❌ ' + (data.message || '点赞失败'));

    btnEl.classList.toggle('liked', !!data.liked);
    const c = btnEl.querySelector('.like-count');
    if (c) c.innerText = Number(data.like_count || 0);
}

// ========== 回复 ==========
async function submitReply(messageId) {
    if (emergencyBlocked()) return;
    const input = document.getElementById('reply_input_' + messageId);
    const content = input.value.trim();
    if (!content) return alert('回复内容不能为空');

    const fd = new FormData();
    fd.append('message_id', String(messageId));
    fd.append('reply_content', content);

    const replyBtn = input.nextElementSibling;
    const originalText = replyBtn.textContent;
    replyBtn.textContent = '回复中...';
    replyBtn.disabled = true;

    try {
        const res = await fetch('/reply', { method: 'POST', body: fd });
        const data = await res.json();

        replyBtn.textContent = originalText;
        replyBtn.disabled = false;

        if (res.status === 429) return alert('⏱ ' + (data.message || '发送太频繁'));

        if (data.status === 'ok') {
            input.value = '';
            showToast('回复成功！');
            await loadMessages();
        } else {
            alert('❌ ' + (data.message || '回复失败'));
        }
    } catch (e) {
        replyBtn.textContent = originalText;
        replyBtn.disabled = false;
        alert('❌ 回复失败，请稍后重试');
    }
}

// ========== 渲染列表 ==========
async function loadMessages() {
    if (emergencyBlocked()) return;

    const container = document.getElementById('listContainer');
    const res = await fetch('/messages');
    const data = await res.json();

    if (data.status !== 'ok') {
        container.innerHTML = `<div class="error-message"><h3>加载失败</h3><p>请稍后重试</p></div>`;
        return;
    }

    const list = data.messages || [];
    if (!list.length) {
        container.innerHTML = `<div class="no-messages">还没有留言，快来发布第一条吧～</div>`;
        return;
    }

    container.innerHTML = list.map(m => {
        const premiumCls = Number(m.is_premium) ? 'premium-bg' : '';
        const contentHtml = m.content ? `<div class="content">${esc(m.content)}</div>` : '';
        const imageHtml = m.image_path ? `<div class="content"><img src="${m.image_path}" alt="img"></div>` : '';
        const likeCount = Number(m.like_count || 0);
        const likedCls = m.liked_by_me ? 'liked' : '';

        const replies = (m.replies || []).map(r => `
            <div class="reply ${premiumCls}">
                <div class="reply-head">
                    <img class="reply-avatar" src="${avatarSrc(r.avatar_path)}" alt="avatar">
                    <div class="reply-head-meta">
                        <div class="reply-content"><b>${esc(r.username || '匿名')}：</b>${esc(r.content || '')}</div>
                        <div class="reply-date">${esc(r.date || '')}</div>
                    </div>
                </div>
            </div>
        `).join('');

        return `
            <div class="message ${premiumCls}">
                <div class="message-head">
                    <img class="message-avatar" src="${avatarSrc(m.avatar_path)}" alt="avatar">
                    <div class="message-head-meta">
                        <div class="date">#${m.id} · ${esc(m.username || '匿名')} · ${esc(m.date || '')}</div>
                    </div>
                </div>

                ${contentHtml}
                ${imageHtml}

                <div class="message-actions">
                    <button class="like-btn ${likedCls}" type="button" onclick="toggleLike(${m.id}, this)">
                        ❤️ <span class="like-count">${likeCount}</span>
                    </button>
                </div>

                <div class="reply-box">
                    ${replies || '<div style="color:#777;">暂无回复</div>'}
                </div>

                <div class="reply-form" style="display:flex; gap:8px; padding:0 12px 12px;">
                    <input id="reply_input_${m.id}" type="text" placeholder="写下回复..."
                        style="flex:1; padding:8px; font-size:16px; border:1px solid #ccc; border-radius:6px;">
                    <button class="submit" type="button" onclick="submitReply(${m.id})">回复</button>
                </div>
            </div>
        `;
    }).join('');
}

// ========== 暗色 / 原本主题 ==========
function initTheme() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    syncThemeBtnText(saved);
}
function syncThemeBtnText(theme) {
    const btn = document.getElementById('themeToggle');
    btn.innerText = theme === 'dark' ? '🎨 原本主题（紫橙）' : '🌙 暗色主题';
}
function toggleTheme() {
    if (emergencyBlocked()) return;
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
    syncThemeBtnText(next);
}

document.getElementById('themeToggle').addEventListener('click', toggleTheme);

const avatarInput = document.getElementById('avatarInput');
if (avatarInput) {
    avatarInput.addEventListener('change', function () {
        const file = this.files && this.files[0];
        uploadAvatar(file);
        this.value = '';
    });
}

initTheme();

// ========== 初始化 ==========
(async function init() {
    if (isEmergencyMode()) {
        showEmergencyScreen();
        return;
    }

    await refreshMe();
    await loadMessages();
})();
</script>
</body>
</html>
